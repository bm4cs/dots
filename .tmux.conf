set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Status bar — powerline-wedge window separators (requires a Nerd Font)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left ""
set -g status-right "#[fg=#89b4fa] %H:%M #[fg=#a6e3a1] %Y-%m-%d "
set -g status-justify left

set -g window-status-separator ""
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#cdd6f4,bg=#313244] #I:#W #[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[fg=#89b4fa,bg=#1e1e2e]"

run '~/.tmux/plugins/tpm/tpm'
